<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banh Mi Tracker - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease; }
        .banh-mi-gradient { background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%); }
        .mode-dark { background-color: #0c0a09; color: #f5f5f4; }
        .mode-dark .card { background-color: #1c1917; border-color: #292524; }
        .mode-dark .input-field { background-color: #0c0a09; border-color: #292524; color: #f5f5f4; opacity: 0.5; }
        .star-filled { fill: #f59e0b; color: #f59e0b; }
        .star-empty { color: #44403c; opacity: 0.5; }
        .btn-disabled { background: #292524 !important; color: #57534e !important; cursor: not-allowed; }
    </style>
</head>
<body class="mode-dark min-h-screen pb-10">

    <header class="banh-mi-gradient p-8 text-white text-center shadow-xl relative">
        <h1 class="text-3xl font-black tracking-tighter">BÀNH MÌ LOG</h1>
        <p id="slogan" class="text-[10px] font-bold opacity-90 tracking-widest mt-1 uppercase">(0.75 banh mi a day keeps the doctor away!)</p>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-6">
        <div class="card rounded-3xl p-6 shadow-lg border text-center transition-all">
            <span class="text-stone-500 uppercase tracking-widest text-[10px] font-bold">Final Count</span>
            <div id="count" class="text-6xl font-black text-orange-500 my-1">15</div>
            <button onclick="exportData()" class="mt-2 text-orange-500 flex items-center gap-1 mx-auto font-bold text-xs uppercase tracking-tighter border border-orange-500/30 px-3 py-1 rounded-full active:scale-95 transition-all">
                <i data-lucide="share" class="w-3 h-3"></i> Export Final Log
            </button>
        </div>

        <div class="card p-5 rounded-3xl shadow-lg border space-y-4 opacity-80">
            <div class="grid grid-cols-4 gap-3">
                <div class="col-span-1">
                    <input disabled type="text" placeholder="-" class="input-field w-full p-4 rounded-xl border-2 text-center font-bold">
                </div>
                <div class="col-span-3">
                    <input disabled type="text" placeholder="Logging closed..." class="input-field w-full p-4 rounded-xl border-2">
                </div>
            </div>
            <button disabled class="w-full btn-disabled rounded-2xl py-4 shadow-lg text-lg font-bold uppercase tracking-widest">
                Trip Complete ✈️
            </button>
            <p class="text-[10px] text-center text-stone-500 font-bold uppercase">All 15 sandwiches have been archived.</p>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-bold text-stone-500 italic px-2">The Full History</h2>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </main>

    <script>
        const finalHistory = [
            { note: "Tiệm nhà Tấm Cám Bánh Mì Tiệm Nhà Tấm Cám", rating: 3, date: "Apr 11", time: "16:00" },
            { note: "Bánh Mì ơi - Hà Nội (the best! Vegan and super crunchy and tasty)", rating: 5, date: "Apr 12", time: "11:00" },
            { note: "Tự Châu Veggie - Vegan Mixed Pho, Banhmi & Kombucha", rating: 3, date: "Apr 12", time: "16:00" },
            { note: "Hàng Bánh Mì (Hang Banh Mi) (no crunch)", rating: 1, date: "Apr 12", time: "21:45" },
            { note: "Egg mayo was okay! The other stuff was way better (coconut coffee and the smashed croissants as waffles) @ THE MIST SAPA", rating: 3, date: "Apr 15", time: "11:00" },
            { note: "Bánh Mì ơi - Hà Nội again (1/2): chicken", rating: 4, date: "Apr 16", time: "22:28" },
            { note: "Bánh Mì ơi - Hà Nội again! The traditional one was amazing! The chicken was also pretty nice but couldn't beat the OG. Super tasty, great crunch and dirt cheap", rating: 5, date: "Apr 16", time: "22:29" },
            { note: "Bánh Mì Ba Bự: special and salt coffee, really nice!", rating: 4, date: "Apr 20", time: "10:47" },
            { note: "Bánh Mì Ba Bự: Tofu banh mi is just not it :/", rating: 3, date: "Apr 20", time: "11:29" },
            { note: "Meliá Vinpearl Hue, 7th-floor Rumba restaurant: very average. Wouldn't take another one. But it was okay for a waiting snack while the bread was toasting!", rating: 2, date: "Apr 21", time: "07:41" },
            { note: "Ba Hưng Bakery: egg banh mi. Totally passable! Wouldn't go out of my way to get it but if the tour bus takes you, you might as well", rating: 3, date: "Apr 21", time: "13:27" },
            { note: "Phi banh mi: traditional and egg. Must be called traditional for a reason!", rating: 5, date: "Apr 23", time: "11:56" },
            { note: "Peanuts (vegan chick'n on a sourdough baguette): this was kinda cheating lol. Even though the chick'n was great and the baguette tasty and crunchy, it didn't hit like I would've expected it to! Also: forgot to remove the coriander", rating: 3, date: "Apr 24", time: "15:33" },
            { note: "74 - Bánh Mì, Cafe & Tea: egg and pate. I liked it, but it had more of a baguette feeling than a banh mi tbh. This one would be a 3.5 if that were possible. Would try again!", rating: 3, date: "Apr 25", time: "13:55" },
            { note: "Bánh Mì The One – Vietnamese Sandwich & Vegan Food: egg and pate. Nice crunch. Just not enough for 5 stars!", rating: 4, date: "Apr 26", time: "12:33" }
        ];

        function updateUI() {
            const listEl = document.getElementById('historyList');
            listEl.innerHTML = [...finalHistory].reverse().map((item, index) => {
                const stars = Array.from({length: 5}, (_, i) => 
                    `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="${i < item.rating ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" class="${i < item.rating ? 'star-filled' : 'star-empty'}"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
                ).join('');

                return `
                    <div class="card p-4 rounded-2xl border shadow-sm space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="font-black text-stone-500 text-[10px] italic">#${finalHistory.length - index}</span>
                            <div class="flex gap-0.5">${stars}</div>
                        </div>
                        <p class="font-bold text-sm leading-snug whitespace-pre-wrap">${item.note}</p>
                        <p class="text-[10px] text-stone-500 uppercase font-bold tracking-tighter">${item.date} @ ${item.time}</p>
                    </div>`;
            }).join('');
            lucide.createIcons();
        }

        function exportData() {
            let text = `🥖 FINAL BÀNH MÌ LOG 🥖\nTotal: 15 sandwiches in 20 days\n\n`;
            [...finalHistory].reverse().forEach((item, i) => {
                text += `#${finalHistory.length - i} ["${"⭐".repeat(item.rating)}"]\n"${item.note}"\n📅 ${item.date} @ ${item.time}\n\n`;
            });
            if (navigator.share) navigator.share({ title: 'My Final Banh Mi Log', text: text });
            else { navigator.clipboard.writeText(text); alert("Final log copied!"); }
        }

        updateUI();
    </script>
</body>
</html>
