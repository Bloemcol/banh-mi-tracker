<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banh Mi Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease; }
        .banh-mi-gradient { background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%); }
        .mode-light { background-color: #fafaf9; color: #1c1917; }
        .mode-light .card { background-color: #ffffff; border-color: #e7e5e4; }
        .mode-light .input-field { background-color: #f5f5f4; border-color: #e7e5e4; color: #1c1917; }
        .mode-dark { background-color: #0c0a09; color: #f5f5f4; }
        .mode-dark .card { background-color: #1c1917; border-color: #292524; }
        .mode-dark .input-field { background-color: #0c0a09; border-color: #292524; color: #f5f5f4; }
        .star-filled { fill: #f59e0b; color: #f59e0b; }
        .star-empty { color: #44403c; opacity: 0.5; }
    </style>
</head>
<body class="mode-dark min-h-screen pb-10">

    <header class="banh-mi-gradient p-6 text-white text-center shadow-xl relative">
        <h1 class="text-3xl font-black tracking-tighter">BÀNH MÌ LOG</h1>
        <button onclick="toggleTheme()" class="absolute right-4 top-1/2 -translate-y-1/2 p-2 bg-white/20 rounded-full">
            <i id="themeIcon" data-lucide="sun" class="w-6 h-6"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-6">
        
        <div class="card rounded-3xl p-6 shadow-lg border text-center">
            <span class="text-stone-500 uppercase tracking-widest text-[10px] font-bold">Total Devoured</span>
            <div id="count" class="text-6xl font-black text-orange-500 my-1">0</div>
        </div>

        <div class="card p-5 rounded-3xl shadow-lg border space-y-4">
            <div class="grid grid-cols-4 gap-3">
                <div class="col-span-1">
                    <label class="text-[10px] font-bold text-stone-500 uppercase block mb-1">Stars</label>
                    <input type="number" id="ratingInput" min="1" max="5" inputmode="numeric" placeholder="1-5" 
                        class="input-field w-full p-4 rounded-xl border-2 outline-none text-center font-bold text-lg">
                </div>
                <div class="col-span-3">
                    <label class="text-[10px] font-bold text-stone-500 uppercase block mb-1">Details</label>
                    <input type="text" id="noteInput" placeholder="Location or thoughts..." 
                        class="input-field w-full p-4 rounded-xl border-2 outline-none">
                </div>
            </div>
            
            <button onclick="addBanhMi()" class="w-full banh-mi-gradient text-white rounded-2xl py-4 shadow-lg text-lg font-bold active:scale-[0.98] transition-transform">
                LOG SANDWICH
            </button>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-end px-2">
                <h2 class="text-lg font-bold text-stone-500 italic">History</h2>
                <button onclick="clearAll()" class="text-[10px] text-stone-400 font-bold uppercase">Reset</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>
    </main>

    <script>
        const initialData = [
            { note: "Tiệm nhà Tấm Cám Bánh Mì Tiệm Nhà Tấm Cám", rating: 3, date: "Apr 11", time: "16:00" },
            { note: "Bánh Mì ơi - Hà Nội (the best! Vegan and super crunchy and tasty)", rating: 5, date: "Apr 12", time: "11:00" },
            { note: "Tự Châu Veggie - Vegan Mixed Pho, Banhmi & Kombucha", rating: 3, date: "Apr 12", time: "16:00" },
            { note: "Hàng Bánh Mì (Hang Banh Mi) (no crunch)", rating: 1, date: "Apr 12", time: "21:45" },
            { note: "Egg mayo was okay! The other stuff was way better (coconut coffee and the smashed croissants as waffles) @ THE MIST SAPA", rating: 3, date: "Apr 15", time: "11:00" }
        ];

        let history = JSON.parse(localStorage.getItem('banhMiHistory')) || [];

        if (history.length < 5 || (history[4] && history[4].time === "18:10")) {
            history = initialData;
            localStorage.setItem('banhMiHistory', JSON.stringify(history));
        }

        let isDarkMode = localStorage.getItem('theme') !== 'light';

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            applyTheme();
        }

        function applyTheme() {
            document.body.className = isDarkMode ? 'mode-dark min-h-screen pb-10' : 'mode-light min-h-screen pb-10';
            const icon = document.getElementById('themeIcon');
            icon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function updateUI() {
            document.getElementById('count').innerText = history.length;
            const listEl = document.getElementById('historyList');
            
            listEl.innerHTML = history.length === 0 ? '' : [...history].reverse().map((item, index) => {
                // Generate the 5-star row visually
                const starRow = Array.from({length: 5}, (_, i) => {
                    const isFilled = i < item.rating;
                    return `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="${isFilled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" class="${isFilled ? 'star-filled' : 'star-empty'}"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
                }).join('');

                return `
                    <div class="card p-4 rounded-2xl border shadow-sm space-y-2 transition-colors">
                        <div class="flex justify-between items-center">
                            <span class="font-black text-stone-500 text-[10px] italic">#${history.length - index}</span>
                            <div class="flex gap-0.5">${starRow}</div>
                        </div>
                        <p class="font-bold text-sm leading-snug">${item.note || 'Banh Mi'}</p>
                        <p class="text-[10px] text-stone-500 uppercase font-bold tracking-tighter">${item.date} @ ${item.time}</p>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function addBanhMi() {
            const rIn = document.getElementById('ratingInput');
            const nIn = document.getElementById('noteInput');
            const val = parseInt(rIn.value);

            if (isNaN(val) || val < 1 || val > 5) return alert("Enter 1-5!");

            const now = new Date();
            history.push({
                rating: val,
                note: nIn.value.trim(),
                date: now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
                time: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false })
            });
            
            localStorage.setItem('banhMiHistory', JSON.stringify(history));
            rIn.value = '';
            nIn.value = '';
            updateUI();
        }

        function clearAll() {
            if (confirm("Reset?")) {
                history = [];
                localStorage.removeItem('banhMiHistory');
                updateUI();
            }
        }

        applyTheme();
        updateUI();
    </script>
</body>
</html>
