<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banh Mi Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .banh-mi-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen">

    <header class="banh-mi-gradient p-6 text-white text-center shadow-lg">
        <h1 class="text-3xl font-black tracking-tight flex justify-center items-center gap-2">
            <i data-lucide="utensils"></i> BÀNH MÌ LOG
        </h1>
        <p class="opacity-90 font-medium mt-1">Crunching numbers, one roll at a time.</p>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-8">
        
        <div class="bg-white rounded-3xl p-8 shadow-sm border border-stone-200 text-center">
            <span class="text-stone-400 uppercase tracking-widest text-xs font-bold">Total Devoured</span>
            <div id="count" class="text-7xl font-black text-orange-600 my-2">0</div>
            <div class="flex justify-center gap-1 text-green-600">
                <i data-lucide="star" class="fill-current"></i>
                <i data-lucide="star" class="fill-current"></i>
                <i data-lucide="star" class="fill-current"></i>
            </div>
        </div>

        <button onclick="addBanhMi()" class="w-full banh-mi-gradient hover:scale-[0.98] active:scale-95 transition-all text-white rounded-2xl py-5 shadow-xl flex items-center justify-center gap-3 text-xl font-bold">
            <i data-lucide="plus-circle"></i> ADD A BANH MI
        </button>

        <div class="space-y-4">
            <div class="flex justify-between items-end px-2">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i data-lucide="history" class="text-stone-400"></i> History
                </h2>
                <button onclick="clearAll()" class="text-xs text-stone-400 font-semibold hover:text-red-500 transition-colors">RESET ALL</button>
            </div>
            <div id="historyList" class="space-y-2">
                </div>
        </div>
    </main>

    <script>
        // Initialize Data
        let history = JSON.parse(localStorage.getItem('banhMiHistory')) || [];

        function updateUI() {
            const countEl = document.getElementById('count');
            const listEl = document.getElementById('historyList');
            
            countEl.innerText = history.length;
            
            listEl.innerHTML = history.length === 0 
                ? '<div class="text-center py-10 text-stone-400 italic">No banh mis yet. Go get lunch!</div>'
                : history.map((item, index) => `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-100 flex justify-between items-center animate-in fade-in slide-in-from-bottom-2">
                        <div>
                            <div class="font-bold text-stone-700">Banh Mi #${history.length - index}</div>
                            <div class="text-xs text-stone-400">${item.date} • ${item.time}</div>
                        </div>
                        <i data-lucide="check-circle-2" class="text-green-500"></i>
                    </div>
                `).reverse().join('');
            
            lucide.createIcons();
        }

        function addBanhMi() {
            const now = new Date();
            const newItem = {
                date: now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                time: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
            };
            
            history.push(newItem);
            localStorage.setItem('banhMiHistory', JSON.stringify(history));
            
            // Haptic feedback (if supported)
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            
            updateUI();
        }

        function clearAll() {
            if (confirm("Are you sure you want to clear your entire banh mi history?")) {
                history = [];
                localStorage.removeItem('banhMiHistory');
                updateUI();
            }
        }

        // Initial Load
        updateUI();
    </script>
</body>
</html>
